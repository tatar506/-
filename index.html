<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕРИДИАН | Нейро-помощник</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #f0f0f0;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Экран инициализации */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1.2s ease, visibility 1.2s;
        }
        .loader-brand { font-weight: 200; letter-spacing: 10px; font-size: 22px; margin-bottom: 15px; }
        .loader-status { font-size: 9px; letter-spacing: 2px; color: #444; text-transform: uppercase; }

        /* Боковая панель */
        aside {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 60px 40px;
            z-index: 10;
        }

        .logo h1 { font-weight: 600; font-size: 18px; letter-spacing: 3px; margin-bottom: 4px; }
        .logo p { font-size: 10px; color: var(--text-dim); margin-bottom: 60px; font-weight: 300; }

        .nav-label { font-size: 10px; color: #444; letter-spacing: 1px; margin-bottom: 15px; display: block; font-weight: 500; }
        .nav-group { margin-bottom: 40px; }
        
        input, select, button {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 18px;
            font-size: 12px;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        
        button { cursor: pointer; font-weight: 500; border: 1px solid rgba(255,255,255,0.1); background: transparent; }
        button:hover { background: #fff; color: #000; transform: translateY(-1px); }

        /* Футер сайдбара (человеческий след) */
        .sidebar-footer { margin-top: auto; font-size: 10px; color: #333; }
        .sidebar-footer p { margin-top: 5px; letter-spacing: 1px; }

        /* Рабочая область */
        main { flex: 1; display: flex; flex-direction: column; background: #080808; position: relative; }
        
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 100px 20% 200px 20%;
            scroll-behavior: smooth;
        }

        /* Сообщения */
        .message {
            margin-bottom: 50px;
            line-height: 1.8;
            font-size: 15px;
            font-weight: 300;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { color: #fff; font-weight: 500; border-left: 1px solid #222; padding-left: 30px; }
        .ai-message { color: #aaa; }

        /* Печатная каретка */
        .typing::after {
            content: '';
            display: inline-block;
            width: 6px; height: 15px;
            background: #fff;
            margin-left: 8px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Ввод */
        .input-box {
            position: absolute; bottom: 60px; left: 20%; right: 20%;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 5px;
            display: flex;
        }
        
        #user-input { border: none; background: transparent; flex: 1; padding: 20px; margin: 0; font-size: 14px; }

        /* Прогресс-бар */
        .token-metric { margin-top: 20px; }
        .track { width: 100%; height: 1px; background: #1a1a1a; margin-top: 10px; }
        #fill { width: 0%; height: 100%; background: #666; transition: 1.5s ease; }

        pre { 
            background: #0d0d0d; padding: 25px; 
            border: 1px solid var(--border); margin: 30px 0;
            font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a5d6ff; overflow-x: auto;
        }
        img { max-width: 100%; margin-top: 30px; border: 1px solid var(--border); transition: 0.6s; }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-brand">МЕРИДИАН</div>
    <div class="loader-status">Подключение к узлу...</div>
</div>

<aside>
    <div class="logo">
        <h1>МЕРИДИАН</h1>
        <p>Нейро-помощник</p>
    </div>

    <div class="nav-group">
        <span class="nav-label">РЕЖИМ ПОМОЩНИКА</span>
        <select id="mode">
            <option value="assistant">ИНТЕЛЛЕКТ</option>
            <option value="code">РАЗРАБОТКА</option>
        </select>
    </div>

    <div class="nav-group">
        <span class="nav-label">ТВОРЧЕСТВО</span>
        <input type="text" id="img-prompt" placeholder="Что нарисовать?">
        <button onclick="generateImage()">Создать образ</button>
    </div>

    <div class="nav-group">
        <span class="nav-label">ИНСТРУМЕНТЫ</span>
        <button onclick="copyCode()">Копировать код</button>
    </div>

    <div class="sidebar-footer">
        <div class="token-metric">
            <span class="nav-label">ПАМЯТЬ</span>
            <div id="token-info" style="font-size: 10px;">0 / 300,000</div>
            <div class="track"><div id="fill"></div></div>
        </div>
        <p>© 2024. Разработано вручную.</p>
    </div>
</aside>

<main>
    <div id="chat-flow"></div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Спросите о чем-нибудь..." onkeydown="if(event.key=='Enter') handleChat()">
    </div>
</main>

<script>
    const API_KEY = "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";
    const MODEL = "arcee-ai/trinity-large-preview:free";
    
    let tokens = 0;
    let history = [];
    let busy = false;

    // Плавный вход
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1200);
        }, 2000);
    });

    async function handleChat() {
        if(busy) return;
        const field = document.getElementById('user-input');
        const val = field.value.trim();
        if(!val) return;
        
        field.value = '';
        appendMessage('user', val);
        
        const aiBox = appendMessage('ai', '');
        aiBox.classList.add('typing');
        busy = true;
        
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [...history, {role: "user", content: val}]
                })
            });

            const data = await res.json();
            const text = data.choices[0].message.content;
            
            await writeText(text, aiBox);
            
            history.push({role: "user", content: val}, {role: "assistant", content: text});
            updateMetrics((val.length + text.length) / 3.5);

        } catch (e) {
            aiBox.innerText = "Извините, возникла проблема со связью. Попробуйте обновить страницу.";
        } finally {
            aiBox.classList.remove('typing');
            busy = false;
        }
    }

    async function writeText(text, box) {
        let i = 0;
        box.innerHTML = "";
        const parts = text.split(/(```[\s\S]*?```)/g);
        
        for (let part of parts) {
            if (part.startsWith("```")) {
                const cleanCode = part.replace(/```(.*?)\n/g, '').replace(/```/g, '');
                box.innerHTML += `<pre><code>${cleanCode}</code></pre>`;
            } else {
                for (let char of part) {
                    box.innerHTML += char === "\n" ? "<br>" : char;
                    if (i % 3 === 0) await new Promise(r => setTimeout(r, 10));
                    i++;
                    const flow = document.getElementById('chat-flow');
                    flow.scrollTop = flow.scrollHeight;
                }
            }
        }
    }

    function appendMessage(role, text) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        div.innerHTML = text;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
        return div;
    }

    function updateMetrics(val) {
        tokens += val;
        const limit = 300000;
        const p = (tokens / limit) * 100;
        document.getElementById('token-info').innerText = `${Math.floor(tokens).toLocaleString()} / 300,000`;
        document.getElementById('fill').style.width = Math.min(p, 100) + '%';
    }

    function generateImage() {
        const p = document.getElementById('img-prompt').value;
        if(!p) return;
        appendMessage('user', `Создай изображение: ${p}`);
        const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1024&height=1024&nologo=true&seed=${Date.now()}`;
        const ai = appendMessage('ai', 'Формирую образ...');
        setTimeout(() => {
            ai.innerHTML = `<img src="${url}"><br><small style="color:#444">Изображение сформировано по вашему запросу.</small>`;
        }, 1200);
        updateMetrics(1000);
    }

    function copyCode() {
        const last = history.filter(m => m.role === 'assistant').pop();
        if(!last) return;
        const code = last.content.match(/```[\s\S]*?```/g);
        if(code) {
            navigator.clipboard.writeText(code.join("\n\n").replace(/```/g, ''));
            alert("Код скопирован в буфер обмена.");
        }
    }
</script>

</body>
</html>
